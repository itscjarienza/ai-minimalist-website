<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circular background -->
  <circle cx="50" cy="50" r="50" fill="#242424"/>
  <!-- 3 converging lines (shorter, thicker — emphasis on the dot) -->
  <line x1="12" y1="30" x2="64" y2="50" stroke="#ede2c7" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="12" y1="50" x2="64" y2="50" stroke="#ede2c7" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="12" y1="70" x2="64" y2="50" stroke="#ede2c7" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Circle (outer ring) -->
  <circle cx="76" cy="50" r="10" stroke="#ede2c7" stroke-width="2.5" fill="none"/>
  <!-- Dot (inner fill) -->
  <circle cx="76" cy="50" r="4" fill="#ede2c7"/>
</svg>
